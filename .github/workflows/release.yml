name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version guard without leading v; must match Version.props.
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  version:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          [xml]$versionProps = Get-Content -LiteralPath "Version.props"
          $versionParts = $versionProps.Project.PropertyGroup
          $canonicalVersion = "$($versionParts.MarkdownTableEditorVersionMajor.InnerText).$($versionParts.MarkdownTableEditorVersionMinor.InnerText).$($versionParts.MarkdownTableEditorVersionPatch.InnerText)"

          $requestedVersion = "${{ github.event.inputs.version }}"
          if (-not $requestedVersion -and "${{ github.ref_type }}" -eq "tag") {
            $requestedVersion = "${{ github.ref_name }}".TrimStart("v")
          }
          if ($requestedVersion -and $requestedVersion -ne $canonicalVersion) {
            throw "Release version '$requestedVersion' does not match Version.props '$canonicalVersion'. Update Version.props first."
          }

          "version=$canonicalVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$canonicalVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    needs: version
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Win32
            label: x86
          - platform: x64
            label: x64
          - platform: ARM64
            label: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3

      - name: Ensure ARM64 C++ build tools
        if: matrix.platform == 'ARM64'
        shell: pwsh
        run: .\scripts\Ensure-VsArm64Tools.ps1

      - name: Build package
        run: msbuild Package.proj /m "/t:Package;CorePerformance" /p:Configuration=Release /p:Platform="${{ matrix.platform }}"
        if: matrix.platform == 'x64'

      - name: Build package
        run: msbuild Package.proj /m /t:Package /p:Configuration=Release /p:Platform="${{ matrix.platform }}"
        if: matrix.platform != 'x64'

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: notepad-${{ matrix.label }}
          path: |
            build/MarkdownTableEditor-${{ needs.version.outputs.version }}-${{ matrix.label }}.zip
            build/MarkdownTableEditor-${{ needs.version.outputs.version }}-${{ matrix.label }}-pluginadmin.zip
          if-no-files-found: error

  compatibility-smoke:
    needs: version
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3

      - name: Notepad++ compatibility smoke
        shell: pwsh
        run: msbuild Package.proj "/t:NppCompatibilitySmoke;NppLatestSmoke"

  release:
    needs:
      - version
      - build
      - compatibility-smoke
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets

      - name: Generate release checksums
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p release-files
          mapfile -t downloaded_files < <(find release-assets -type f -name '*.zip' | sort)
          if [ "${#downloaded_files[@]}" -eq 0 ]; then
            echo "No release ZIP files were downloaded." >&2
            exit 1
          fi

          for file in "${downloaded_files[@]}"; do
            cp "$file" "release-files/$(basename "$file")"
          done

          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > "release-files/MarkdownTableEditor-$VERSION-sbom.cdx.json" <<EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.6",
            "version": 1,
            "metadata": {
              "timestamp": "$timestamp",
              "component": {
                "type": "application",
                "name": "NppMarkdownTableEditor",
                "version": "$VERSION",
                "purl": "pkg:github/krotname/NppMarkdownTableEditor@v$VERSION"
              }
            }
          }
          EOF

          mapfile -t files < <(find release-files -maxdepth 1 -type f \( -name '*.zip' -o -name '*-sbom.cdx.json' \) | sort)
          sha256sum "${files[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release provenance attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            release-files/*.zip
            release-files/*-sbom.cdx.json
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mapfile -t files < <(find release-files -maxdepth 1 -type f \( -name '*.zip' -o -name '*-sbom.cdx.json' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release ZIP files were downloaded." >&2
            exit 1
          fi
          cat > release-notes.md <<EOF
          ## Builds / Downloads

          - [MarkdownTableEditor-$VERSION-x86.zip](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-x86.zip)
          - [MarkdownTableEditor-$VERSION-x86-pluginadmin.zip](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-x86-pluginadmin.zip)
          - [MarkdownTableEditor-$VERSION-x64.zip](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-x64.zip)
          - [MarkdownTableEditor-$VERSION-x64-pluginadmin.zip](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-x64-pluginadmin.zip)
          - [MarkdownTableEditor-$VERSION-arm64.zip](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-arm64.zip)
          - [MarkdownTableEditor-$VERSION-arm64-pluginadmin.zip](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-arm64-pluginadmin.zip)
          - [MarkdownTableEditor-$VERSION-sbom.cdx.json](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditor-$VERSION-sbom.cdx.json)
          - [SHA256SUMS.txt](https://github.com/krotname/NppMarkdownTableEditor/releases/download/v$VERSION/SHA256SUMS.txt)

          ## What's Changed

          - Fixed Power Auto Fit so typing in lower sparse or continuation rows keeps the caret in the edited row instead of jumping back to the second row.
          - Prevented pending auto-format timers from overriding plugin edits and manual column-width actions.
          - Kept Java/C++ core behavior in sync for continuation-row reflow, manual column resizing, caret placement, escaped pipes, and Unicode/CJK width handling.
          - Added latest Notepad++ portable smoke coverage with retry handling for transient release API failures.
          - Rebuilt x86, x64, and arm64 plugin ZIPs plus Plugin Admin ZIPs with SHA-256 sums, SBOM, and GitHub attestations.

          ## Validation

          - GitHub Actions release build completed for Win32, x64, and ARM64 with coverage and performance checks.
          - GitHub Actions compatibility smoke completed for Notepad++ 7.5.9 x86, 8.3.1 x64, and the latest portable x64 release.
          EOF

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --title "Markdown Table Editor $VERSION" --notes-file release-notes.md --latest
          else
            gh release create "$TAG_NAME" "${files[@]}" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Markdown Table Editor $VERSION" --notes-file release-notes.md --latest
          fi

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version guard without leading v; must match Version.props.
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  version:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          [xml]$versionProps = Get-Content -LiteralPath "Version.props"
          $versionParts = $versionProps.Project.PropertyGroup
          $canonicalVersion = "$($versionParts.MarkdownTableEditorVersionMajor.InnerText).$($versionParts.MarkdownTableEditorVersionMinor.InnerText).$($versionParts.MarkdownTableEditorVersionPatch.InnerText)"

          $requestedVersion = "${{ github.event.inputs.version }}"
          if (-not $requestedVersion -and "${{ github.ref_type }}" -eq "tag") {
            $requestedVersion = "${{ github.ref_name }}".TrimStart("v")
          }
          if ($requestedVersion -and $requestedVersion -ne $canonicalVersion) {
            throw "Release version '$requestedVersion' does not match Version.props '$canonicalVersion'. Update Version.props first."
          }

          "version=$canonicalVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$canonicalVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    needs: version
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Win32
            label: x86
          - platform: x64
            label: x64
          - platform: ARM64
            label: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3

      - name: Ensure ARM64 C++ build tools
        if: matrix.platform == 'ARM64'
        shell: pwsh
        run: .\scripts\Ensure-VsArm64Tools.ps1

      - name: Build package
        run: msbuild Package.proj /m "/t:Package;CorePerformance" /p:Configuration=Release /p:Platform="${{ matrix.platform }}"
        if: matrix.platform == 'x64'

      - name: Build package
        run: msbuild Package.proj /m /t:Package /p:Configuration=Release /p:Platform="${{ matrix.platform }}"
        if: matrix.platform != 'x64'

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: notepad-${{ matrix.label }}
          path: |
            build/MarkdownTableEditor-${{ needs.version.outputs.version }}-${{ matrix.label }}.zip
            build/MarkdownTableEditor-${{ needs.version.outputs.version }}-${{ matrix.label }}-pluginadmin.zip
          if-no-files-found: error

  compatibility-smoke:
    needs: version
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3

      - name: Notepad++ compatibility smoke
        shell: pwsh
        run: msbuild Package.proj /t:NppCompatibilitySmoke

  release:
    needs:
      - version
      - build
      - compatibility-smoke
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets

      - name: Generate release checksums
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f -name '*.zip' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release ZIP files were downloaded." >&2
            exit 1
          fi

          sha256sum "${files[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: SHA256SUMS.txt

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mapfile -t files < <(find release-assets -type f -name '*.zip' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release ZIP files were downloaded." >&2
            exit 1
          fi

          sha256sum "${files[@]}" > SHA256SUMS.txt
          cat > release-notes.md <<EOF
          ## What's Changed

          - Added Narrow column and Widen column commands with Ctrl+Alt+Shift+, and Ctrl+Alt+Shift+. shortcuts.
          - Added toolbar icons for narrowing and widening the current Markdown table column.
          - Kept Java/C++ wrapping behavior in sync for manual column resizing, long-cell continuation rows, protected Markdown links, code spans, and narrow-width hard wrapping.
          - Fixed queued startup auto-format so files opened into Notepad++ are formatted only after Scintilla has loaded the document text.
          - Preserved alignment, sorting, CSV/TSV conversion, escaped pipes, UTF-8/CJK width handling, caret placement, and row/column edits.
          - Built Notepad++ plugin packages for x86, x64, and arm64 on GitHub Actions.
          - Published Plugin Admin ZIP files with MarkdownTableEditor.dll at the archive root.
          - Added compatibility smoke coverage for Notepad++ 7.5.9 x86 and 8.3.1 x64.
          - Included SHA-256 sums for Plugin Admin verification.

          ## Validation

          - GitHub Actions release build completed for Win32, x64, and ARM64 with coverage and performance checks.
          - GitHub Actions compatibility smoke completed for Notepad++ 7.5.9 x86 and 8.3.1 x64.
          EOF

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --title "Markdown Table Editor $VERSION" --notes-file release-notes.md --latest
          else
            gh release create "$TAG_NAME" "${files[@]}" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Markdown Table Editor $VERSION" --notes-file release-notes.md --latest
          fi
